name: Build e Publicar Loomify para Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

permissions:
  contents: write      # necessário para criar Releases

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Construir instalador Windows (.exe)
        run: npm run desktop-build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # sem assinatura de código

      - name: Encontrar o arquivo .exe gerado
        id: find_exe
        run: |
          EXE_PATH=$(find dist-electron -name "*.exe" | head -n 1)
          EXE_NAME=$(basename "$EXE_PATH")
          echo "EXE_PATH=$EXE_PATH" >> $GITHUB_OUTPUT
          echo "EXE_NAME=$EXE_NAME" >> $GITHUB_OUTPUT
          echo "Arquivo encontrado: $EXE_PATH"

      - name: Criar tag automática com versão + data
        id: tag
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          DATE=$(date +'%Y%m%d-%H%M')
          TAG="v${VERSION}-build-${DATE}"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Tag gerada: $TAG"

      - name: Publicar Release com o instalador
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "Loomify ${{ steps.tag.outputs.TAG }}"
          body: |
            ## 📥 Download do Loomify para Windows

            Clique no arquivo `.exe` abaixo para baixar e instalar.

            **Como instalar:**
            1. Baixe o arquivo `Loomify Setup*.exe`
            2. Clique duas vezes para instalar
            3. Pronto — Loomify abre como qualquer programa!
          files: ${{ steps.find_exe.outputs.EXE_PATH }}
          draft: false
          prerelease: false
